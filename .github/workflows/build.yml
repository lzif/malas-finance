name: Auto Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Regenerate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1

      - name: Decode Keystore
        run: base64 -d app/malas.keystore.base64 > app/malas.keystore

      - name: Test
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Publish Latest APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          NEW_APK_PATH="$(dirname "$OLD_APK_PATH")/MalasFinance.apk"
          mv "$OLD_APK_PATH" "$NEW_APK_PATH"

          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | awk '{print $3}' | tr -d '"' | tr -d '=' | tr -d ' ')
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0"; fi

          # ponytail: keep existing latest tag; avoids GITHUB_TOKEN workflow-scope tag push failure.
          gh release upload latest "$NEW_APK_PATH" --clobber || \
            gh release create latest "$NEW_APK_PATH" --title "Latest Auto-Build" --notes "Build v${VERSION_NAME} (Run #${{ github.run_number }})."
