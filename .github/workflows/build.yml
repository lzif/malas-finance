name: Auto Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - "libs.versions.toml"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Decode Keystore
        run: base64 -d app/malas.keystore.base64 > app/malas.keystore

      - name: Test
        run: ./gradlew testDebugUnitTest
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Publish Versioned Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          OLD_APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | awk '{print $3}' | tr -d '"' | tr -d '=' | tr -d ' ')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | awk '{print $3}' | tr -d '=' | tr -d ' ')
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0"; fi
          if [ -z "$VERSION_CODE" ]; then VERSION_CODE="0"; fi

          TAG="v${VERSION_NAME}-b${BUILD_NUMBER}"
          APK_NAME="MalasFinance-v${VERSION_NAME}-b${BUILD_NUMBER}.apk"
          APK_PATH="$(dirname "$OLD_APK_PATH")/$APK_NAME"
          mv "$OLD_APK_PATH" "$APK_PATH"

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || true)
          {
            echo "## MalasFinance v${VERSION_NAME} (Build ${BUILD_NUMBER})"
            echo
            echo "- Version code: ${VERSION_CODE}"
            echo "- Commit: ${GITHUB_SHA}"
            echo
            echo "## Changelog"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD"
            else
              git log --pretty=format:'- %s (%h)' --max-count=20
            fi
            echo
          } > release-notes.md

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_PATH" --clobber
            gh release edit "$TAG" --title "MalasFinance v${VERSION_NAME} (Build ${BUILD_NUMBER})" --notes-file release-notes.md --latest
          else
            gh release create "$TAG" "$APK_PATH" \
              --target "$GITHUB_SHA" \
              --title "MalasFinance v${VERSION_NAME} (Build ${BUILD_NUMBER})" \
              --notes-file release-notes.md \
              --latest
          fi
