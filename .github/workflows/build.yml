name: Auto Build APK

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Regenerate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1

      - name: Decode Keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Build Release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Rename APK and Clobber Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cari file APK
          OLD_APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          # Ekstrak versionName dari build.gradle.kts (asumsi format: versionName = "1.3.0")
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | awk '{print $3}' | tr -d '"' | tr -d '=' | tr -d ' ')
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0"; fi
          
          # Bikin nama baru yang unik biar Chrome nggak bikin (1).apk
          NEW_APK_NAME="MalasFinance-v${VERSION_NAME}-b${{ github.run_number }}.apk"
          NEW_APK_PATH="$(dirname "$OLD_APK_PATH")/$NEW_APK_NAME"
          mv "$OLD_APK_PATH" "$NEW_APK_PATH"
          
          # Update tag dan timpa release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest
          
          gh release create latest "$NEW_APK_PATH" --title "Latest Auto-Build" --notes "Build v${VERSION_NAME} (Run #${{ github.run_number }})." --clobber
